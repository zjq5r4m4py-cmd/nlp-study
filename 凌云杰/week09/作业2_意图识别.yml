    - data:
        code: |
          def main(query: str) -> dict:
              # 内置机器学习知识库
              ml_knowledge = {
                  "机器学习": "机器学习是人工智能的核心分支，让计算机从数据中自动学习规律，无需显式编程即可完成预测、分类等任务，核心分为监督学习、无监督学习、强化学习三大类。",
                  "监督学习": "监督学习是用带标注的数据集训练模型，让模型学习输入到输出的映射关系，常见算法有线性回归、逻辑回归、决策树、随机森林、SVM等，核心用于分类和回归任务。",
                  "决策树": "决策树是一种树形结构的监督学习算法，通过对特征进行层层划分来实现分类或回归，优点是可解释性强、处理数据灵活，缺点是容易过拟合。",
                  "随机森林": "随机森林是集成学习算法，通过构建多棵独立的决策树，最终以投票或平均的方式输出结果，有效降低单棵决策树的过拟合风险，准确率和鲁棒性更强。",
                  "过拟合": "过拟合是指模型在训练集上表现极好，但在未见过的测试集上表现很差的现象，核心原因是模型学习了训练集中的噪声和无关细节，泛化能力下降。",
                  "交叉验证": "交叉验证是一种模型评估方法，将数据集划分为多个子集，轮流用部分子集训练、剩余子集测试，多次迭代后取平均结果，能更稳定地评估模型的泛化能力，避免数据划分带来的偏差。"
              }
              
              # 关键词匹配检索
              result = "未匹配到机器学习相关知识库内容，可补充提问更具体的机器学习问题。"
              for keyword, content in ml_knowledge.items():
                  if keyword in query:
                      result = content
                      break
              
              return {"ml_knowledge": result}
