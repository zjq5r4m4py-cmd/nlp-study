    - data:
        code: |
          def main(query: str) -> dict:
              # 内置大模型知识库
              llm_knowledge = {
                  "大模型": "大语言模型（LLM）是基于Transformer架构、用海量文本数据预训练的超大规模深度学习模型，具备强大的自然语言理解、生成、推理能力，是当前生成式AI的核心技术底座。",
                  "LLM": "LLM是大语言模型（Large Language Model）的缩写，核心是通过预训练学习人类语言的规律和知识，能完成对话、写作、翻译、代码生成、逻辑推理等多种任务。",
                  "RAG": "RAG全称检索增强生成（Retrieval-Augmented Generation），是大模型应用的核心技术，通过先从知识库中检索相关信息，再让大模型基于检索内容生成回答，能有效解决大模型幻觉、知识过时的问题。",
                  "LoRA": "LoRA全称低秩适配（Low-Rank Adaptation），是大模型轻量化微调的核心技术，通过冻结大模型主干权重，只训练少量新增的低秩矩阵，就能让大模型适配特定场景，大幅降低微调的算力和存储成本。",
                  "大模型幻觉": "大模型幻觉是指大模型生成的内容看似通顺合理，但与事实不符、编造虚假信息的现象，是当前大模型落地应用中最核心的优化难点之一。",
                  "Transformer": "Transformer是2017年提出的深度学习架构，核心是自注意力机制，能并行处理文本、捕捉长距离的语义依赖，是当前所有主流大模型的基础架构。"
              }
              
              # 关键词匹配检索
              result = "未匹配到大模型相关知识库内容，可补充提问更具体的大模型问题。"
              for keyword, content in llm_knowledge.items():
                  if keyword in query:
                      result = content
                      break
              
              return {"llm_knowledge": result}
